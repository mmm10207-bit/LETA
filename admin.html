<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Leta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f2419;
    --paper: #f5efe4;
    --paper-deep: #ede4d3;
    --accent: #d65a1a;
    --muted: #6b6357;
    --line: #d4cab8;
    --green: #2d6e3e;
    --blue: #2c5e8e;
    --red: #b04612;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
  }
  .container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }

  /* Login screen */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    max-width: 400px;
    width: 100%;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
  }
  .login-card .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 40px;
    font-style: italic;
    margin-bottom: 8px;
  }
  .logo-dot { color: var(--accent); }
  .login-card .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .login-card input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--paper);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 12px;
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .login-card button {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .login-card button:hover { background: var(--accent); }
  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }

  /* Dashboard */
  .dashboard.hidden { display: none; }
  nav {
    padding: 20px 0;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .nav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo-link {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-style: italic;
    text-decoration: none;
    color: var(--ink);
  }
  .nav-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .logout-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 8px 16px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
  }
  .logout-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 32px 0;
  }
  .stat-card {
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    line-height: 1;
  }
  .stat-value.accent { color: var(--accent); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .tab {
    background: transparent;
    border: none;
    padding: 14px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }

  /* Section */
  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .search-input {
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--paper);
    font-family: inherit;
    font-size: 14px;
    min-width: 240px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  /* Orders table */
  .orders-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .order-card {
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
  }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .order-customer {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 2px;
  }
  .order-meta {
    font-size: 13px;
    color: var(--muted);
  }
  .order-price {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .order-details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin: 16px 0;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .detail-block {
    font-size: 13px;
  }
  .detail-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .detail-value {
    word-break: break-word;
  }
  .detail-value a {
    color: var(--accent);
    text-decoration: none;
  }
  .detail-value a:hover { text-decoration: underline; }

  .order-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .status-select {
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--paper);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .status-select.status-new { border-color: var(--blue); color: var(--blue); }
  .status-select.status-quoted { border-color: var(--accent); color: var(--accent); }
  .status-select.status-paid { border-color: var(--green); color: var(--green); }
  .status-select.status-ordered { border-color: var(--green); color: var(--green); }
  .status-select.status-shipped { border-color: var(--green); color: var(--green); }
  .status-select.status-delivered { border-color: var(--ink); color: var(--ink); background: var(--ink); color: var(--paper); }
  .status-select.status-cancelled { border-color: var(--red); color: var(--red); }

  .whatsapp-btn {
    background: var(--green);
    color: var(--paper);
    border: none;
    padding: 8px 14px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .whatsapp-btn:hover { opacity: 0.9; }

  /* Waitlist */
  .waitlist-table {
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
  }
  .waitlist-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .waitlist-row:last-child { border-bottom: none; }
  .waitlist-row.header {
    background: var(--ink);
    color: var(--paper);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .waitlist-row .date { color: var(--muted); font-size: 13px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .save-indicator {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .save-indicator.show { opacity: 1; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .order-details { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="logo">leta<span class="logo-dot">.</span></div>
    <div class="subtitle">Admin login</div>
    <input type="password" id="passwordInput" placeholder="Enter admin password" autofocus>
    <button onclick="checkPassword()">Sign in</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="dashboard">
  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="logo-link">leta<span class="logo-dot">.</span></a>
      <div class="nav-actions">
        <button class="logout-btn" onclick="refreshAll()">↻ Refresh</button>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total orders</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">New (unhandled)</div>
        <div class="stat-value accent" id="statNew">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Waitlist signups</div>
        <div class="stat-value" id="statWaitlist">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Quoted value (KES)</div>
        <div class="stat-value" id="statRevenue">0</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('orders')">Orders</button>
      <button class="tab" onclick="switchTab('waitlist')">Waitlist</button>
    </div>

    <!-- Orders section -->
    <div class="section active" id="section-orders">
      <div class="section-header">
        <h2 style="font-family: 'Instrument Serif', serif; font-size: 32px;">Orders</h2>
        <input type="text" class="search-input" id="orderSearch" placeholder="Search by name, phone, status..." oninput="renderOrders()">
      </div>
      <div class="orders-list" id="ordersList">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

    <!-- Waitlist section -->
    <div class="section" id="section-waitlist">
      <div class="section-header">
        <h2 style="font-family: 'Instrument Serif', serif; font-size: 32px;">Waitlist</h2>
      </div>
      <div class="waitlist-table" id="waitlistTable">
        <div class="empty-state">Loading...</div>
      </div>
    </div>
  </div>

  <div class="save-indicator" id="saveIndicator">Saved</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============================================
  // CONFIG
  // ============================================
  const SUPABASE_URL = 'https://ufqepwgcwndmaxyllkzr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmcWVwd2djd25kbWF4eWxsa3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA3NzMsImV4cCI6MjA5Mjk1Njc3M30.EF_gMzvK4PZz3koa9MKBUcFbACh5c9K1yLnI_hhZZIE';

  // CHANGE THIS PASSWORD before deploying.
  // Don't share this file with anyone.
  const ADMIN_PASSWORD = 'citadel@5819';
  // ============================================

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allOrders = [];
  let allWaitlist = [];

  // ----- Login -----
  function checkPassword() {
    const input = document.getElementById('passwordInput');
    const error = document.getElementById('loginError');
    if (input.value === ADMIN_PASSWORD) {
      sessionStorage.setItem('leta_admin_logged_in', 'yes');
      showDashboard();
    } else {
      error.textContent = 'Wrong password.';
      input.value = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('leta_admin_logged_in');
    location.reload();
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.remove('hidden');
    refreshAll();
  }

  // Stay logged in for the session
  if (sessionStorage.getItem('leta_admin_logged_in') === 'yes') {
    showDashboard();
  }

  document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // ----- Tabs -----
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('section-' + name).classList.add('active');
  }

  // ----- Data loading -----
  async function refreshAll() {
    await Promise.all([loadOrders(), loadWaitlist()]);
    updateStats();
  }

  async function loadOrders() {
    const { data, error } = await supabaseClient
      .from('orders')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      console.error(error);
      document.getElementById('ordersList').innerHTML = '<div class="empty-state">Error loading orders. Check console.</div>';
      return;
    }
    allOrders = data || [];
    renderOrders();
  }

  async function loadWaitlist() {
    const { data, error } = await supabaseClient
      .from('waitlist')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      console.error(error);
      document.getElementById('waitlistTable').innerHTML = '<div class="empty-state">Error loading waitlist. Check console.</div>';
      return;
    }
    allWaitlist = data || [];
    renderWaitlist();
  }

  // ----- Stats -----
  function updateStats() {
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statNew').textContent = allOrders.filter(o => o.status === 'new').length;
    document.getElementById('statWaitlist').textContent = allWaitlist.length;
    const revenue = allOrders.reduce((sum, o) => sum + (o.quoted_price_kes || 0), 0);
    document.getElementById('statRevenue').textContent = revenue.toLocaleString('en-KE');
  }

  // ----- Render orders -----
  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleString('en-KE', { dateStyle: 'medium', timeStyle: 'short' });
  }

  function formatKES(amount) {
    return 'KES ' + (amount || 0).toLocaleString('en-KE');
  }

  function whatsappLink(phone, name, refLike) {
    // Clean phone: keep digits only, then add 254 prefix if it starts with 0
    let clean = (phone || '').replace(/\D/g, '');
    if (clean.startsWith('0')) clean = '254' + clean.slice(1);
    if (clean.startsWith('7') || clean.startsWith('1')) clean = '254' + clean;
    const message = encodeURIComponent(`Hi ${name || ''}, this is Leta about your order. We've reviewed it and the final price is KES [amount]. To confirm, please pay via M-Pesa to [number]. Thanks!`);
    return `https://wa.me/${clean}?text=${message}`;
  }

  function renderOrders() {
    const search = document.getElementById('orderSearch').value.toLowerCase().trim();
    const filtered = !search ? allOrders : allOrders.filter(o =>
      (o.customer_name || '').toLowerCase().includes(search) ||
      (o.phone || '').toLowerCase().includes(search) ||
      (o.status || '').toLowerCase().includes(search) ||
      (o.product_notes || '').toLowerCase().includes(search) ||
      (o.delivery_address || '').toLowerCase().includes(search)
    );

    const list = document.getElementById('ordersList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">${allOrders.length === 0 ? 'No orders yet. Once people submit through the order page, they show up here.' : 'No orders match your search.'}</div>`;
      return;
    }

    list.innerHTML = filtered.map(o => `
      <div class="order-card" data-id="${o.id}">
        <div class="order-top">
          <div>
            <div class="order-customer">${escapeHtml(o.customer_name || '(no name)')}</div>
            <div class="order-meta">
              #${o.id} · ${formatDate(o.created_at)} · ${escapeHtml(o.phone || '(no phone)')}
            </div>
          </div>
          <div class="order-price">${formatKES(o.quoted_price_kes)}</div>
        </div>

        <div class="order-details">
          <div class="detail-block">
            <div class="detail-label">Product</div>
            <div class="detail-value">${escapeHtml(o.product_notes || '(none)')}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Product link</div>
            <div class="detail-value">
              ${o.product_url ? `<a href="${escapeHtml(o.product_url)}" target="_blank" rel="noopener">Open product →</a>` : '(none)'}
            </div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Delivery address</div>
            <div class="detail-value">${escapeHtml(o.delivery_address || '(none)')}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Phone</div>
            <div class="detail-value">${escapeHtml(o.phone || '(none)')}</div>
          </div>
        </div>

        <div class="order-controls">
          <select class="status-select status-${o.status}" onchange="updateStatus(${o.id}, this.value)">
            ${['new', 'quoted', 'paid', 'ordered', 'shipped', 'delivered', 'cancelled'].map(s =>
              `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`
            ).join('')}
          </select>
          <a href="${whatsappLink(o.phone, o.customer_name, o.id)}" target="_blank" rel="noopener" class="whatsapp-btn">WhatsApp customer</a>
        </div>
      </div>
    `).join('');
  }

  function renderWaitlist() {
    const table = document.getElementById('waitlistTable');
    if (allWaitlist.length === 0) {
      table.innerHTML = '<div class="empty-state">No signups yet.</div>';
      return;
    }
    table.innerHTML = `
      <div class="waitlist-row header">
        <div>Email</div>
        <div>Joined</div>
      </div>
      ${allWaitlist.map(w => `
        <div class="waitlist-row">
          <div>${escapeHtml(w.email)}</div>
          <div class="date">${formatDate(w.created_at)}</div>
        </div>
      `).join('')}
    `;
  }

  // ----- Update status -----
  async function updateStatus(orderId, newStatus) {
    const { error } = await supabaseClient
      .from('orders')
      .update({ status: newStatus })
      .eq('id', orderId);

    if (error) {
      alert('Could not update. Try again.');
      console.error(error);
      return;
    }

    // Update local copy
    const order = allOrders.find(o => o.id === orderId);
    if (order) order.status = newStatus;

    // Show saved indicator
    const indicator = document.getElementById('saveIndicator');
    indicator.classList.add('show');
    setTimeout(() => indicator.classList.remove('show'), 1500);

    updateStats();
    renderOrders();
  }

  // ----- Helpers -----
  function escapeHtml(text) {
    if (text == null) return '';
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>

</body>
</html>
